<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pago exitoso</title>
  <style>
    body{font-family:Arial,sans-serif;background:#12051d;color:#fff;display:grid;place-items:center;min-height:100vh;margin:0}
    .box{background:#1d0d2b;padding:24px;border-radius:18px;max-width:520px;text-align:center}
    a{color:#fff}
  </style>
</head>
<body>
  <div class="box">
    <h1>Pago realizado</h1>
    <p>Tu complacencia fue pagada con éxito.</p>
    <p id="msg">Confirmando estado...</p>
    <a href="/">Volver</a>
  </div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const sessionId = params.get("session_id");
  if (!sessionId) {
    document.getElementById("msg").textContent = "No se encontró la sesión de pago.";
    return;
  }

  const res = await fetch(`/api/dj/payment/confirm?session_id=${encodeURIComponent(sessionId)}`);
  const data = await res.json();
  document.getElementById("msg").textContent = data.ok
    ? "Pago confirmado y enviado al DJ."
    : (data.error || "No se pudo confirmar el pago.");
})();
</script>
</body>
</html>
