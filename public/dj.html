<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Votify Dj — Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    :root{
      --bg:#12051d;
      --card:#1d0d2b;
      --line:rgba(255,255,255,.08);
      --text:#fff;
      --muted:rgba(255,255,255,.7);
      --primary:#9E1AAD;
      --ok:#1fbf75;
      --danger:#ff5d73;
      --warn:#ffb020;
      --info:#4ea1ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 20% 0%, rgba(158,26,173,.18), transparent 60%),
        linear-gradient(180deg,#12051d,#1b082a);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:1300px;margin:0 auto;padding:24px}
    .top{
      display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:24px;
    }
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:54px;height:54px;border-radius:14px;object-fit:cover}
    .title{font-size:28px;font-weight:800}
    .sub{color:var(--muted);margin-top:4px}
    .qrbox{
      background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;
      display:flex;align-items:center;gap:14px;min-width:360px;
    }
    .qrbox img{
      width:120px;height:120px;background:#fff;border-radius:14px;padding:8px;object-fit:contain;
    }
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .col{
      background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:20px;padding:14px;min-height:420px;
    }
    .col h3{
      margin:0 0 14px;font-size:18px;display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .count{opacity:.7;font-size:13px}
    .empty{color:var(--muted);font-size:14px;padding:10px 4px}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:12px;
      box-shadow:0 8px 30px rgba(0,0,0,.15);
    }
    .song{display:flex;gap:10px}
    .song img{
      width:58px;height:58px;border-radius:12px;object-fit:cover;background:#2f2040;flex:0 0 58px;
    }
    .song h4{margin:0 0 4px;font-size:15px;line-height:1.2}
    .song p{margin:0;font-size:13px;color:var(--muted);line-height:1.3}
    .meta{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.55}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    button{
      border:none;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer;transition:transform .12s ease, opacity .12s ease;
    }
    button:hover{transform:translateY(-1px)}
    .btn-ok{background:var(--ok);color:#fff}
    .btn-danger{background:var(--danger);color:#fff}
    .btn-warn{background:var(--warn);color:#151515}
    .btn-info{background:var(--info);color:#fff}
    .linkpay{
      display:inline-block;margin-top:10px;color:#fff;text-decoration:none;background:var(--primary);
      padding:10px 12px;border-radius:12px;font-weight:700;
    }
    .errorBox{
      display:none;margin-bottom:16px;background:rgba(255,93,115,.12);color:#ffd7dd;
      border:1px solid rgba(255,93,115,.35);border-radius:16px;padding:12px 14px;white-space:pre-wrap;
    }

    @media (max-width:1100px){ .grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width:700px){
      .grid{grid-template-columns:1fr}
      .qrbox{width:100%;min-width:auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="errorBox" class="errorBox"></div>

    <div class="top">
      <div class="brand">
        <img src="/icon.png" alt="Votify">
        <div>
          <div class="title">Votify Dj</div>
          <div class="sub" id="roomName">Cargando sala...</div>
        </div>
      </div>

      <div class="qrbox">
        <img id="qr" alt="QR del cliente" src="/icon.png">
        <div>
          <div style="font-weight:800;font-size:18px">QR del cliente</div>
          <div class="sub">Escanea para enviar complacencias en vivo</div>
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="col">
        <h3><span>Pendientes</span> <span class="count" id="countPending">(0)</span></h3>
        <div id="pendingList"></div>
      </div>

      <div class="col">
        <h3><span>Aceptadas</span> <span class="count" id="countAccepted">(0)</span></h3>
        <div id="acceptedList"></div>
      </div>

      <div class="col">
        <h3><span>Pagadas</span> <span class="count" id="countPaid">(0)</span></h3>
        <div id="paidList"></div>
      </div>

      <div class="col">
        <h3><span>Rechazadas / Tocadas</span> <span class="count" id="countOther">(0)</span></h3>
        <div id="otherList"></div>
      </div>
    </div>
  </div>

<script>
const room = location.pathname.split("/").pop();
const socket = window.io ? io() : null;

let state = { room: null, requests: [] };

if (socket) {
  socket.emit("room:join", { room: `dj:${room}` });
  socket.on("dj:requests:update", (payload) => {
    if (!payload || payload.roomId !== room) return;
    state.requests = payload.requests || [];
    render();
  });
}

function showError(message) {
  const box = document.getElementById("errorBox");
  box.style.display = "block";
  box.textContent = String(message || "Error desconocido");
}

async function loadState() {
  try {
    const res = await fetch(`/api/dj/${room}/state`, { headers: { "Accept": "application/json" } });
    const text = await res.text();

    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error(`La API no devolvió JSON.\n\nRespuesta:\n${text.slice(0, 300)}`); }

    if (!res.ok || !data.ok) throw new Error(data.error || `Error HTTP ${res.status}`);

    state.room = data.room;
    state.requests = data.requests || [];

    document.getElementById("roomName").textContent = data.room?.name || "Sala DJ";
    document.getElementById("qr").src = data.qrUrl || "/icon.png";

    render();
  } catch (err) {
    console.error("loadState error:", err);
    showError(err.message || "Error cargando sala DJ");
    document.getElementById("roomName").textContent = "No se pudo cargar la sala";
  }
}

function card(req) {
  const payBtn = req.paymentUrl
    ? `<a class="linkpay" href="${req.paymentUrl}" target="_blank" rel="noopener noreferrer">Abrir pago PayPal</a>`
    : "";

  const acceptBtn = req.status === "pending"
    ? `<button class="btn-ok" onclick="acceptReq('${req.id}')">Aceptar</button>`
    : "";

  const rejectBtn = req.status === "pending"
    ? `<button class="btn-danger" onclick="rejectReq('${req.id}')">Rechazar</button>`
    : "";

  const markPaidBtn = req.status === "accepted_waiting_payment"
    ? `<button class="btn-info" onclick="markPaid('${req.id}')">Marcar pagada</button>`
    : "";

  const playedBtn = req.status === "paid"
    ? `<button class="btn-warn" onclick="markPlayed('${req.id}')">Marcar tocada</button>`
    : "";

  return `
    <div class="card">
      <div class="song">
        <img src="${req.artwork || '/icon.png'}" alt="">
        <div>
          <h4>${escapeHtml(req.title)}</h4>
          <p>${escapeHtml(req.artist)}</p>
          <p>${escapeHtml(req.album || "")}</p>
        </div>
      </div>

      <div class="meta">
        Cliente: <strong>${escapeHtml(req.customerName || "Cliente")}</strong><br>
        Estado: <strong>${escapeHtml(req.status)}</strong><br>
        Precio: <strong>Q.${Number(req.price || 20).toFixed(2)}</strong>
        ${req.rejectionReason ? `<br>Motivo: <strong>${escapeHtml(req.rejectionReason)}</strong>` : ""}
      </div>

      <div class="actions">
        ${acceptBtn}
        ${rejectBtn}
        ${markPaidBtn}
        ${playedBtn}
      </div>

      ${payBtn}
    </div>
  `;
}

function render() {
  const requests = Array.isArray(state.requests) ? state.requests : [];

  const pending = requests.filter(x => x.status === "pending");
  const accepted = requests.filter(x => x.status === "accepted_waiting_payment");
  const paid = requests.filter(x => x.status === "paid");
  const other = requests.filter(x => x.status === "rejected" || x.status === "played");

  document.getElementById("countPending").textContent = `(${pending.length})`;
  document.getElementById("countAccepted").textContent = `(${accepted.length})`;
  document.getElementById("countPaid").textContent = `(${paid.length})`;
  document.getElementById("countOther").textContent = `(${other.length})`;

  document.getElementById("pendingList").innerHTML =
    pending.length ? pending.map(card).join("") : `<div class="empty">Sin pendientes</div>`;

  document.getElementById("acceptedList").innerHTML =
    accepted.length ? accepted.map(card).join("") : `<div class="empty">Sin aceptadas</div>`;

  document.getElementById("paidList").innerHTML =
    paid.length ? paid.map(card).join("") : `<div class="empty">Sin pagadas</div>`;

  document.getElementById("otherList").innerHTML =
    other.length ? other.map(card).join("") : `<div class="empty">Sin historial</div>`;
}

async function acceptReq(requestId) {
  try {
    const res = await fetch(`/api/dj/${room}/request/${requestId}/accept`, {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "No se pudo aceptar");
  } catch (err) {
    console.error(err);
    alert(err.message || "No se pudo aceptar");
  }
}

async function rejectReq(requestId) {
  try {
    const reason = prompt("Motivo del rechazo:", "No disponible en este momento") || "No disponible";

    const res = await fetch(`/api/dj/${room}/request/${requestId}/reject`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ reason })
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "No se pudo rechazar");
  } catch (err) {
    console.error(err);
    alert(err.message || "No se pudo rechazar");
  }
}

async function markPaid(requestId) {
  try {
    const ok = confirm("¿Ya verificaste que el cliente sí pagó en PayPal?");
    if (!ok) return;

    const res = await fetch(`/api/dj/${room}/request/${requestId}/mark-paid`, {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "No se pudo marcar como pagada");
  } catch (err) {
    console.error(err);
    alert(err.message || "No se pudo marcar como pagada");
  }
}

async function markPlayed(requestId) {
  try {
    const res = await fetch(`/api/dj/${room}/request/${requestId}/played`, {
      method: "POST",
      headers: { "Content-Type": "application/json" }
    });

    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "No se pudo marcar");
  } catch (err) {
    console.error(err);
    alert(err.message || "No se pudo marcar");
  }
}

function escapeHtml(s) {
  return String(s || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

loadState();
</script>
</body>
</html>
