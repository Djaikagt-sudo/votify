<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pagar complacencia — Votify Dj</title>

<style>
body{
  margin:0;
  font-family:Inter,system-ui,Arial,sans-serif;
  background:linear-gradient(180deg,#12051d,#1b082a);
  color:#fff;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:20px;
}

.box{
  width:100%;
  max-width:520px;
  background:#1d0d2b;
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  padding:26px;
  text-align:center;
}

h1{
  margin:0 0 10px;
  font-size:30px;
}

.meta{
  margin-top:16px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,.05);
}

.paypal{
  margin-top:22px;
}
</style>

</head>
<body>

<div class="box">

<h1>Pago de complacencia</h1>

<p>
Completa el pago en PayPal para que el DJ pueda marcar tu canción como pagada.
</p>

<div class="meta">
<div><b>Canción:</b> <span id="title">—</span></div>
<div><b>Artista:</b> <span id="artist">—</span></div>
<div><b>Monto:</b> Q<span id="amount">20</span></div>
</div>

<div class="paypal">

<div id="paypal-container-MZTKHHE5TB6AY"></div>

</div>

<p style="margin-top:18px;color:rgba(255,255,255,.7)">
Después de pagar, muéstrale al DJ la confirmación.
</p>

</div>


<script>
const params = new URLSearchParams(location.search)

document.getElementById("title").textContent =
params.get("title") || "Complacencia"

document.getElementById("artist").textContent =
params.get("artist") || "—"

document.getElementById("amount").textContent =
params.get("amount") || "20"
</script>


<!-- PAYPAL PARTE 1 -->
<script 
src="https://www.paypal.com/sdk/js?client-id=BAAAaOssVOljj2_H8WamfI3TNAAxEbUApLODLoRPcFqnZURnlnmiq2QXjA6q1uvGQVflMXeZAkZ85r_Nx8&components=hosted-buttons&disable-funding=venmo&currency=USD">
</script>

<!-- PAYPAL PARTE 2 -->
<script>
paypal.HostedButtons({
hostedButtonId: "MZTKHHE5TB6AY",
}).render("#paypal-container-MZTKHHE5TB6AY")
</script>

</body>
</html>
