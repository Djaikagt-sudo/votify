<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Votify — Votar</title>

<link rel="icon" type="image/png" href="/icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--primary:#9E1AAD;
--accent:#FF14E4;
--dark:#1B0426;
--line:rgba(255,255,255,.10);
--muted:rgba(255,255,255,.75);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
background:
radial-gradient(900px 500px at 20% 10%, rgba(158,26,173,.18) 0%, transparent 60%),
radial-gradient(900px 500px at 80% 20%, rgba(255,20,228,.10) 0%, transparent 55%),
linear-gradient(180deg,#120018,#1B0426);
color:#fff;
}

.wrap{
max-width:980px;
margin:auto;
padding:16px;
}

.card{
background:rgba(255,255,255,.04);
border:1px solid var(--line);
border-radius:18px;
overflow:hidden;
box-shadow:0 18px 60px rgba(0,0,0,.35);
}

.head{
padding:14px;
display:flex;
justify-content:space-between;
flex-wrap:wrap;
gap:12px;
border-bottom:1px solid var(--line);
}

.titleRow{
display:flex;
align-items:center;
gap:10px;
}

.logoMark{
width:56px;
height:56px;
border-radius:14px;
background:rgba(158,26,173,.14);
display:grid;
place-items:center;
}

.logoMark img{
width:100%;
height:100%;
object-fit:contain;
padding:9px;
}

h1{
margin:0;
font-size:18px;
font-weight:800;
}

.muted{
font-size:12px;
color:var(--muted);
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

.pill{
border:1px solid var(--line);
padding:6px 10px;
border-radius:999px;
font-size:12px;
}

input{
height:34px;
border-radius:10px;
border:1px solid rgba(255,255,255,.12);
background:rgba(0,0,0,.25);
color:#fff;
padding:0 10px;
}

.now{
padding:12px;
border-bottom:1px solid var(--line);
}

.bar{
margin-top:8px;
height:10px;
border-radius:999px;
background:rgba(255,255,255,.06);
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,var(--primary),var(--accent));
}

.list{
padding:14px;
display:grid;
gap:10px;
}

.item{
border:1px solid rgba(255,255,255,.10);
border-radius:14px;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
background:rgba(0,0,0,.25);
}

.item.blocked{
opacity:.6;
}

.meta{
flex:1 1 220px;
}

.meta b{
font-size:14px;
}

.meta small{
display:block;
font-size:12px;
color:var(--muted);
}

.right{
display:flex;
gap:8px;
align-items:center;
}

.badge{
font-size:12px;
padding:6px 10px;
border-radius:999px;
background:rgba(255,255,255,.06);
}

button{
height:34px;
padding:0 14px;
border-radius:10px;
border:1px solid rgba(255,20,228,.35);
background:rgba(158,26,173,.25);
color:#fff;
font-weight:700;
cursor:pointer;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#000;
border:1px solid rgba(255,255,255,.20);
padding:10px 14px;
border-radius:14px;
display:none;
}

@media(max-width:640px){

.right{
width:100%;
justify-content:flex-end;
}

button{
flex:1;
}

}

</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="head">

<div class="titleRow">
<div class="logoMark"><img src="/icon.png"></div>
<div>
<h1 id="title">Votify</h1>
<div class="muted">Vota por tu canción favorita</div>
</div>
</div>

<div class="controls">
<div class="pill" id="status">Conectando…</div>
<input id="name" placeholder="Tu nombre (opcional)">
</div>

</div>

<div class="now">
<b id="nowTitle">Reproduciendo: —</b>
<div class="bar">
<div class="fill" id="fill"></div>
</div>
</div>

<div class="list" id="list"></div>

</div>
</div>

<div class="toast" id="toast"></div>

<script src="/socket.io/socket.io.js"></script>

<script>

const room = location.pathname.split("/r/")[1];

let songs=[];
let startedAt=0;
let duration=0;

const fill=document.getElementById("fill");
const list=document.getElementById("list");

function toast(t){
const el=document.getElementById("toast");
el.textContent=t;
el.style.display="block";
setTimeout(()=>el.style.display="none",2500);
}

function render(){

list.innerHTML="";

const sorted=[...songs].sort((a,b)=>{
const ab=a.blocked?1:0;
const bb=b.blocked?1:0;
if(ab!==bb)return ab-bb;
return b.votes-a.votes;
});

sorted.forEach(song=>{

const el=document.createElement("div");
el.className="item"+(song.blocked?" blocked":"");

let subtitle=song.artist||"";

if(song.blocked)
subtitle="⛔ PENDIENTE DE LINK CORRECTO";

el.innerHTML=`
<div class="meta">
<b>${song.title}</b>
<small>${subtitle}</small>
</div>

<div class="right">
<div class="badge">${song.votes} votos</div>
<button ${song.blocked?"disabled":""}>Votar</button>
</div>
`;

const btn=el.querySelector("button");

btn.onclick=async()=>{

const r=await fetch(`/api/r/${room}/vote/${song.id}`,{
method:"POST",
headers:{
"Content-Type":"application/json",
"x-device-id":localStorage.deviceId||crypto.randomUUID()
}
});

if(!r.ok){
toast("No se pudo votar");
return;
}

song.votes++;

render();
};

list.appendChild(el);

});

}

async function load(){

const r=await fetch(`/api/r/${room}/state`);
const d=await r.json();

songs=d.songs||[];

render();

}

function startBar(){

setInterval(()=>{

if(!startedAt||!duration)return;

const elapsed=(Date.now()-startedAt)/1000;

const pct=Math.min(100,(elapsed/duration)*100);

fill.style.width=pct+"%";

},300);

}

const socket=io();

socket.on("connect",()=>{
document.getElementById("status").textContent="Conectado ✅";
socket.emit("room:join",{room});
});

socket.on("votes:update",data=>{
if(data.room!==room)return;
songs=data.songs;
render();
});

socket.on("song:update",data=>{
if(data.room!==room)return;

startedAt=data.startedAt;
duration=data.durationSec;

localStorage.lastNow=JSON.stringify(data);

startBar();
});

(async()=>{

await load();

const last=localStorage.lastNow;

if(last){

const data=JSON.parse(last);

startedAt=data.startedAt;
duration=data.durationSec;

startBar();

}

})();

</script>

</body>
</html>
