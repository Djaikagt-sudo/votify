<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Votify — Votar</title>

  <link rel="icon" type="image/png" href="/icon.png" />

  <script src="/vendor/socket.io.min.js"></script>

  <style>
    :root{
      --primary:#9E1AAD;
      --dark:#1B0426;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.7);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background: radial-gradient(1200px 700px at 30% 0%, rgba(158,26,173,.35), transparent 60%),
                  linear-gradient(180deg, #12001d, #0b0012);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }
    .wrap{
      width:min(980px, 100%);
      margin:0 auto;
      padding:22px 16px 70px;
      flex:1;
    }
    .top{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding:14px 16px;
      border:1px solid var(--border);
      background:var(--card);
      border-radius:18px;
      backdrop-filter: blur(12px);
    }
    .brand{
      display:flex; gap:10px; align-items:center;
      font-weight:800;
    }
    .brand .dot{
      width:34px;height:34px;border-radius:12px;
      background:linear-gradient(135deg,#b833ff,#7b2cff);
      display:grid;place-items:center;
      font-weight:900;
    }
    .status{
      display:flex; gap:10px; align-items:center;
      font-size:13px; color:var(--muted);
    }
    .pill{
      border:1px solid var(--border);
      background:rgba(0,0,0,.18);
      padding:8px 10px;
      border-radius:12px;
      display:flex; gap:8px; align-items:center;
    }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:14px;
      margin-top:14px;
    }
    .now{
      border:1px solid var(--border);
      background:var(--card);
      border-radius:18px;
      padding:14px 16px;
    }
    .now h3{margin:0 0 8px 0; font-size:14px; color:var(--muted); font-weight:700;}
    .now .line{
      display:flex; justify-content:space-between; gap:10px; align-items:center;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
    }
    .nameInput{
      width:220px;
      max-width:48vw;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:var(--text);
      padding:10px 12px;
      outline:none;
    }
    .list{
      border:1px solid var(--border);
      background:var(--card);
      border-radius:18px;
      overflow:hidden;
    }
    .listHeader{
      padding:12px 16px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:space-between;
      color:var(--muted);
      font-weight:700;
      font-size:13px;
    }
    .song{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:12px 16px;
      border-top:1px solid rgba(255,255,255,.08);
      align-items:center;
    }
    .song:first-child{border-top:none}
    .song .meta{min-width:0}
    .song .title{font-weight:800}
    .song .artist{font-size:12px;color:var(--muted);margin-top:2px}
    .voteBtn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      background:linear-gradient(135deg,#b833ff,#7b2cff);
      color:white;
      font-weight:900;
      cursor:pointer;
      white-space:nowrap;
    }
    .voteBtn:disabled{opacity:.55; cursor:not-allowed}
    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:78px;
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.16);
      color:white;
      padding:10px 14px;
      border-radius:14px;
      backdrop-filter: blur(12px);
      display:none;
      font-weight:700;
      z-index:50;
    }
    footer{
      position:fixed;
      left:0; right:0; bottom:0;
      background:rgba(0,0,0,.28);
      border-top:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      padding:10px 14px;
      color:rgba(255,255,255,.7);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="top">
      <div class="brand">
        <div class="dot">V</div>
        <div>
          <div>Votify</div>
          <div style="font-size:12px;color:rgba(255,255,255,.68);font-weight:600;">Vota por tu canción favorita</div>
        </div>
      </div>

      <div class="status">
        <div class="pill" id="connPill">Conectando…</div>
        <input class="nameInput" id="nameInput" placeholder="Tu nombre (opcional)" maxlength="24" />
      </div>
    </div>

    <div class="grid">
      <div class="now">
        <h3>Reproduciendo:</h3>
        <div class="line">
          <div id="nowText">—</div>
        </div>
      </div>

      <div class="list">
        <div class="listHeader">
          <div>Canciones</div>
          <div>Votar</div>
        </div>
        <div id="songs"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <footer>
    © Votify. Los derechos de autor pertenecen a sus respectivos dueños. Votify no aloja contenido; reproduce videos de YouTube mediante su API/enlace público.
  </footer>

  <script>
    const room = location.pathname.split("/").pop();
    const API_BASE = `/api/r/${room}`;
    const songsEl = document.getElementById("songs");
    const nowText = document.getElementById("nowText");
    const connPill = document.getElementById("connPill");
    const nameInput = document.getElementById("nameInput");
    const toast = document.getElementById("toast");

    // device id estable
    const DEVICE_KEY = "votify_device_id";
    let deviceId = localStorage.getItem(DEVICE_KEY);
    if(!deviceId){
      deviceId = crypto.randomUUID();
      localStorage.setItem(DEVICE_KEY, deviceId);
    }

    // guardar nombre local
    const NAME_KEY = "votify_name";
    nameInput.value = localStorage.getItem(NAME_KEY) || "";
    nameInput.addEventListener("input", () => {
      localStorage.setItem(NAME_KEY, nameInput.value.trim().slice(0,24));
    });

    function showToast(msg){
      toast.textContent = msg;
      toast.style.display = "block";
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.style.display = "none", 2200);
    }

    function esc(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function renderSongs(songs){
      songsEl.innerHTML = "";
      songs.forEach((s) => {
        const row = document.createElement("div");
        row.className = "song";
        row.innerHTML = `
          <div class="meta">
            <div class="title">${esc(s.title || "Sin título")}</div>
            <div class="artist">${esc(s.artist || "")}</div>
          </div>
          <button class="voteBtn">Votar</button>
        `;
        const btn = row.querySelector("button");
        btn.onclick = async () => {
          btn.disabled = true;
          try{
            const name = (localStorage.getItem(NAME_KEY) || "").trim().slice(0,24);

            const r = await fetch(`${API_BASE}/vote/${encodeURIComponent(s.id)}`, {
              method:"POST",
              headers:{
                "Content-Type":"application/json",
                "x-device-id": deviceId
              },
              body: JSON.stringify({ deviceId, name })
            });

            const data = await r.json().catch(() => ({}));
            if(!r.ok || !data.ok){
              showToast(data.error || "No se pudo votar");
              btn.disabled = false;
              return;
            }
            showToast("✅ Voto enviado");
          }catch(e){
            showToast("Error de red");
            btn.disabled = false;
          }
        };
        songsEl.appendChild(row);
      });
    }

    async function loadState(){
      const r = await fetch(`${API_BASE}/state`);
      const data = await r.json();
      if(!data.ok) throw new Error(data.error || "Error");
      renderSongs(data.songs || []);
      return data;
    }

    // socket
    const socket = io({ transports:["websocket","polling"] });
    socket.on("connect", () => {
      connPill.textContent = "Conectado ✅";
      socket.emit("room:join", { room });
    });
    socket.on("disconnect", () => {
      connPill.textContent = "Reconectando…";
    });

    socket.on("votes:update", ({ songs }) => {
      if(Array.isArray(songs)) renderSongs(songs);
    });

    socket.on("song:update", ({ songId }) => {
      // opcional: podrías buscar el título en la lista, aquí solo mostramos id
      // mejor: el tv.html puede enviar title/artist, pero no lo tocamos ahorita
    });

    // primer load
    loadState().catch(err => showToast(err.message));
  </script>
</body>
</html>
