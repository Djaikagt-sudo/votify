<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Votify — Votar</title>

  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#9E1AAD;
      --dark:#1B0426;
      --accent:#FF14E4;
      --card:#121428;
      --line:#232643;
      --txt:#ffffff;
      --muted:rgba(255,255,255,.72);
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--txt);
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(158,26,173,.22), transparent 60%),
        radial-gradient(900px 500px at 85% 0%, rgba(255,20,228,.12), transparent 55%),
        linear-gradient(180deg, #120018, var(--dark) 60%, #070810);
      padding:18px;
    }
    .wrap{max-width:900px;margin:0 auto}
    .loadBar{
      position:fixed; top:0; left:0; right:0; height:3px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      background-size:200% 100%;
      animation: loadbar 1.1s linear infinite;
      z-index:9999;
    }
    @keyframes loadbar{0%{background-position:0% 0}100%{background-position:200% 0}}
    header{
      border:1px solid var(--line);
      background: rgba(18,20,40,.72);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
      margin-bottom:12px;
    }
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .titleRow{display:flex;align-items:center;gap:10px}
    .logoMark{
      width:40px;height:40px;border-radius:14px;
      border:1px solid rgba(255,20,228,.20);
      background: rgba(158,26,173,.12);
      display:grid;place-items:center;overflow:hidden;flex:0 0 auto;
      box-shadow: 0 10px 30px rgba(158,26,173,.14);
    }
    .logoMark img{width:100%;height:100%;object-fit:contain;padding:7px}
    h1{margin:0;font-size:18px;font-weight:800}
    .muted{color:var(--muted);font-size:12px;margin-top:4px}
    .pill{
      border:1px solid var(--line);
      background: rgba(255,255,255,.03);
      padding:6px 10px;
      border-radius:999px;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }
    .progressWrap{margin-top:12px}
    .progressRow{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .timeLeft{font-weight:800;font-size:12px;color:#e9e9ff}
    .bar{
      margin-top:8px;height:10px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;overflow:hidden;
    }
    .fill{
      height:100%;width:0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width .35s linear;
    }
    .card{
      border:1px solid var(--line);
      background: rgba(18,20,40,.72);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:14px;
    }
    .input{
      width:100%;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background: rgba(0,0,0,.25);
      color:#fff;
      outline:none;
      font-size:14px;
    }
    .list{margin-top:12px; display:grid; gap:10px}
    .item{
      display:grid;
      grid-template-columns: 1fr auto;
      gap:10px;
      align-items:center;
      padding:12px 12px;
      border-radius: 16px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.20);
    }
    .meta{min-width:0}
    .meta b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .meta small{display:block;margin-top:2px;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .right{display:flex;align-items:center;gap:10px}
    .badge{
      font-weight:800;font-size:12px;
      padding:7px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(158,26,173,.14);
    }
    button{
      border:0;cursor:pointer;
      border-radius: 12px;
      padding:10px 12px;
      font-weight:800;font-size:13px;color:#fff;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      box-shadow: 0 12px 34px rgba(158,26,173,.18);
    }
    button:active{transform: translateY(1px)}
    button:disabled{opacity:.55;cursor:not-allowed}
    .toast{
      position:fixed;
      left:50%; transform:translateX(-50%);
      bottom:18px;
      padding:12px 16px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(18,20,40,.85);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      display:none;
      max-width: min(720px, calc(100vw - 28px));
      color:#fff;
      font-weight:800;
      text-align:center;
      z-index:999;
    }
    .toast span{color:rgba(255,255,255,.85); font-weight:600}
    .footer{
      margin:18px 0 6px;
      text-align:center;
      color: rgba(183,185,214,.75);
      font-size:12px;
    }
  </style>
</head>

<body>
<div class="loadBar" id="loadBar"></div>

<div class="wrap">
  <header>
    <div class="top">
      <div>
        <div class="titleRow">
          <div class="logoMark">
            <img src="/icon.png" alt="Votify" onerror="this.style.display='none'; this.parentElement.textContent='V'">
          </div>
          <h1 id="restTitle">Votify — Votar</h1>
        </div>
        <div class="muted" id="roomText">Sala: —</div>
      </div>
      <div class="pill" id="statusPill">Conectando…</div>
    </div>

    <div class="progressWrap">
      <div class="progressRow">
        <div class="pill" id="nowPill">Reproduciendo: —</div>
        <div class="timeLeft" id="timeLeft">⏳ —</div>
      </div>
      <div class="bar"><div class="fill" id="fill"></div></div>
    </div>
  </header>

  <div class="card">
    <div class="muted" style="margin-bottom:8px">Tu nombre (aparece en la TV)</div>
    <input class="input" id="nameInput" placeholder="Ej: Charly" maxlength="30">
    <div class="list" id="songList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="footer">© <span id="year"></span> Charly García — Votify</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // room robusto: /r/:room
  const room = (() => {
    const parts = location.pathname.split("/").filter(Boolean);
    const i = parts.indexOf("r");
    return i >= 0 ? (parts[i + 1] || "") : "";
  })();

  document.getElementById("roomText").textContent = `Sala: ${room || "—"}`;
  document.getElementById("year").textContent = new Date().getFullYear();

  const lb = document.getElementById("loadBar");
  window.addEventListener("load", ()=> setTimeout(()=> lb && (lb.style.display="none"), 500));

  const socket = io({ transports: ["websocket","polling"] });
  const statusPill = document.getElementById("statusPill");
  const listEl = document.getElementById("songList");
  const toastEl = document.getElementById("toast");

  let songs = [];

  // Tiempo de canción (si lo emites desde TV)
  let songStartedAt = 0;
  let durationSec = 0;
  let nowSongId = null;
  let tick;

  socket.on("connect", () => {
    statusPill.textContent = "Conectado ✅";
    if (room) socket.emit("room:join", { room });
    loadState();
  });

  socket.on("disconnect", () => {
    statusPill.textContent = "Desconectado…";
  });

  socket.on("votes:update", (payload) => {
    if (!payload || payload.room !== room) return;
    songs = payload.songs || [];
    render();
  });

  socket.on("song:update", (data) => {
    if (!data || data.room !== room) return;
    songStartedAt = Number(data.startedAt || 0);
    durationSec = Number(data.durationSec || 0);
    nowSongId = data.songId ?? null;

    const s = songs.find(x => String(x.id) === String(nowSongId));
    document.getElementById("nowPill").textContent = s
      ? `Reproduciendo: ${s.artist} — ${s.title}`
      : "Reproduciendo: —";

    startTick();
  });

  async function loadState(){
    if (!room) {
      showToast("❌ ", "Sala inválida");
      return;
    }

    try {
      const res = await fetch(`/api/r/${encodeURIComponent(room)}/state`, { cache: "no-store" });
      const text = await res.text();
      const data = text ? JSON.parse(text) : {};

      if (!res.ok) {
        showToast("❌ ", `State ${res.status} ${data?.error || ""}`.trim());
        return;
      }

      songs = data.songs || [];
      if (data.name) document.getElementById("restTitle").textContent = data.name;

      render();
      statusPill.textContent = "Listo ✅";
    } catch (e) {
      showToast("❌ ", "No se pudo cargar estado");
      statusPill.textContent = "Error…";
    }
  }

  function render(){
    listEl.innerHTML = "";
    const sorted = [...songs].sort((a,b)=> Number(b.votes||0) - Number(a.votes||0));

    sorted.forEach((song) => {
      const item = document.createElement("div");
      item.className = "item";

      item.innerHTML = `
        <div class="meta">
          <b>${escapeHtml(song.title || "")}</b>
          <small>${escapeHtml(song.artist || "")}</small>
        </div>
        <div class="right">
          <div class="badge">${Number(song.votes||0)} votos</div>
          <button type="button">Votar</button>
        </div>
      `;

      const btn = item.querySelector("button");
      btn.addEventListener("click", async () => {
        btn.disabled = true;
        await vote(song.id);
        btn.disabled = false;
      });

      listEl.appendChild(item);
    });
  }

  async function vote(songId){
    const voter = (document.getElementById("nameInput").value || "Alguien").trim();
    const url = `/api/r/${encodeURIComponent(room)}/vote/${encodeURIComponent(songId)}`;

    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ voter })
      });

      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch {}

      if (!res.ok) {
        showToast("❌ ", `Voto ${res.status} ${data?.error || ""}`.trim());
        return;
      }

      // ✅ update optimista (por si el server aún no emite socket)
      const s = songs.find(x => String(x.id) === String(songId));
      if (s) s.votes = Number(s.votes || 0) + 1;
      render();

      // ✅ source of truth
      loadState();

      showToast("✅ ", "Voto enviado");
    } catch (e) {
      showToast("❌ ", "Sin conexión / fetch bloqueado");
    }
  }

  function startTick(){
    clearInterval(tick);
    tick = setInterval(() => {
      if (!songStartedAt || !durationSec) return;

      const elapsed = (Date.now() - songStartedAt) / 1000;
      const remaining = Math.max(0, Math.ceil(durationSec - elapsed));

      document.getElementById("timeLeft").textContent = `⏳ ${formatTime(remaining)}`;

      const pct = Math.max(0, Math.min(100, (elapsed / durationSec) * 100));
      document.getElementById("fill").style.width = pct + "%";
    }, 350);
  }

  function formatTime(sec){
    const m = Math.floor(sec/60);
    const s = Math.floor(sec%60);
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  function showToast(bold, rest){
    toastEl.innerHTML = `${bold}<span>${escapeHtml(rest)}</span>`;
    toastEl.style.display = "block";
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=> toastEl.style.display="none", 1800);
  }

  function escapeHtml(str){
    return String(str)
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }
</script>
</body>
</html>
