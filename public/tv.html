<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Votify — TV</title>

  <link rel="icon" type="image/png" href="/icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="/vendor/socket.io.min.js"></script>
  <script src="https://www.youtube.com/iframe_api"></script>

  <style>
    :root{
      --primary:#9E1AAD;
      --primary2:#7b2cff;
      --bg0:#0b0012;
      --bg1:#12001d;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.7);
      --good:#34d399;
      --bad:#ff4d6d;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 30% 0%, rgba(158,26,173,.35), transparent 60%),
        radial-gradient(900px 600px at 90% 30%, rgba(123,44,255,.25), transparent 60%),
        linear-gradient(180deg,var(--bg1),var(--bg0));
      overflow:hidden;
    }

    .wrap{
      height:100%;
      display:grid;
      grid-template-columns: 1.55fr .95fr;
      gap:16px;
      padding:16px;
    }

    .left, .right{
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--card);
      backdrop-filter: blur(14px);
    }

    .title{
      font-size:28px;
      font-weight:900;
      letter-spacing:.2px;
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .subtitle{
      margin-top:4px;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }
    .metaRow{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .pill{
      display:flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      color:var(--muted);
      font-weight:800;
      font-size:13px;
    }
    .dot{
      width:10px;height:10px;border-radius:99px;
      background:rgba(255,255,255,.35);
    }
    .dot.good{background:var(--good)}
    .dot.bad{background:var(--bad)}

    .playerCard{
      flex:1;
      min-height:0;
      border-radius:18px;
      border:1px solid var(--border);
      background:rgba(0,0,0,.25);
      overflow:hidden;
      position:relative;
    }

    .playerTop{
      position:absolute;
      left:12px;
      top:12px;
      display:flex;
      gap:10px;
      z-index:5;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      color:white;
      background:linear-gradient(135deg,#b833ff,#7b2cff);
      box-shadow: 0 10px 40px rgba(0,0,0,.3);
    }
    .btn.secondary{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      color:white;
    }
    .btn:active{transform:translateY(1px)}

    #player{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    .hint{
      position:absolute;
      top:12px;
      right:12px;
      z-index:5;
      font-size:12px;
      color:rgba(255,255,255,.7);
      padding:8px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
    }

    .rightTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--card);
      backdrop-filter: blur(14px);
    }
    .brand{
      font-weight:1000;
      letter-spacing:.6px;
      font-size:24px;
      background:linear-gradient(90deg,#d9a3ff,var(--primary2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .panel{
      flex:1;
      min-height:0;
      border-radius:18px;
      border:1px solid var(--border);
      background:var(--card);
      backdrop-filter: blur(14px);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .panelHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-weight:900;
      font-size:13px;
    }

    .qrArea{
      display:grid;
      grid-template-columns: 170px 1fr;
      gap:14px;
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      align-items:center;
    }

    .qrBox{
      width:170px;
      height:170px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25);
      display:grid;
      place-items:center;
    }
    .qrBox img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .cta h2{
      margin:0;
      font-size:20px;
      font-weight:1000;
      letter-spacing:.2px;
    }
    .cta .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.18);
      font-weight:1000;
      font-size:12px;
    }
    .cta .url{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.72);
      word-break:break-all;
      line-height:1.35;
    }

    .list{
      overflow:auto;
      padding:10px;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.18);
      margin-bottom:10px;
    }
    .rank{
      width:26px;height:26px;border-radius:10px;
      display:grid;place-items:center;
      font-weight:1000;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.14);
      flex:0 0 auto;
    }
    .info{min-width:0; flex:1}
    .songTitle{font-weight:1000; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .songArtist{font-size:12px;color:rgba(255,255,255,.7); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
    .votes{
      flex:0 0 auto;
      font-weight:1000;
      font-size:12px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.18);
      min-width:76px;
      text-align:center;
    }

    /* Toast quien votó */
    #voteToast{
      position:fixed;
      left:50%;
      top:22px;
      transform:translateX(-50%);
      background:rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.16);
      color:white;
      padding:10px 14px;
      border-radius:14px;
      backdrop-filter: blur(12px);
      display:none;
      z-index:9999;
      font-weight:1000;
      max-width:70vw;
      text-align:center;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    /* Progreso (simple) */
    .progressWrap{
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      margin-top:8px;
    }
    .progressBar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#ff4dff,#7b2cff);
    }

    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
      .right{display:none}
      .title{font-size:22px}
    }
  </style>
</head>

<body>
  <div id="voteToast"></div>

  <div class="wrap">
    <!-- LEFT -->
    <div class="left">
      <div class="bar">
        <div style="min-width:0">
          <div class="title" id="nowTitle">Votify — TV</div>
          <div class="subtitle">
            <span id="nowArtist">—</span>
          </div>

          <div class="metaRow" style="margin-top:10px">
            <div class="pill"><span style="font-weight:1000;color:white">Sala:</span> <span id="roomId">—</span></div>
            <div class="pill"><span style="font-weight:1000;color:white">Modo:</span> <span id="modeText">no repetir</span></div>
            <div class="pill">
              <span class="dot" id="connDot"></span>
              <span id="connText">Conectando…</span>
            </div>
          </div>

          <div class="progressWrap">
            <div class="progressBar" id="progressBar"></div>
          </div>
        </div>

        <div class="pill" style="font-weight:1000;color:white; opacity:.9">
          Siempre suena
        </div>
      </div>

      <div class="playerCard">
        <div class="playerTop">
          <button class="btn" id="startBtn" style="display:none">Iniciar reproducción</button>
          <button class="btn secondary" id="soundBtn" style="display:none">Activar sonido</button>
        </div>

        <div class="hint">Auto-skip solo por error real • Start si autoplay bloqueado</div>
        <div id="player"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="rightTop">
        <div class="brand" id="roomName">VOTIFY</div>
        <div class="pill">En vivo</div>
      </div>

      <div class="panel">
        <div class="panelHeader">
          <div>Top de votos</div>
          <div style="opacity:.8">En vivo</div>
        </div>

        <div class="qrArea">
          <div class="qrBox">
            <img id="qrImg" alt="QR Votify" />
          </div>
          <div class="cta">
            <h2>ESCANEA Y VOTA</h2>
            <div class="tag">YOU ARE THE DJ</div>
            <div class="url" id="qrUrlText">—</div>
          </div>
        </div>

        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

  <script>
    // ===== Helpers =====
    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const clamp = (n,min,max)=>Math.max(min,Math.min(max,n));

    // ===== Room =====
    const room = location.pathname.split("/").pop();
    $("roomId").textContent = room;

    // ===== Socket =====
    const socket = io({ transports:["websocket","polling"] });

    function setConn(ok){
      $("connText").textContent = ok ? "Conectado ✅" : "Conectando…";
      $("connDot").classList.toggle("good", ok);
      $("connDot").classList.toggle("bad", !ok);
      $("connDot").classList.toggle("dot", true);
    }

    socket.on("connect", () => {
      setConn(true);
      socket.emit("room:join", { room });
    });
    socket.on("disconnect", () => setConn(false));

    // Toast “quién votó”
    const voteToast = $("voteToast");
    function showVoteToast(text){
      voteToast.textContent = text;
      voteToast.style.display = "block";
      clearTimeout(showVoteToast._t);
      showVoteToast._t = setTimeout(() => voteToast.style.display = "none", 2500);
    }
    socket.on("vote:toast", (p) => {
      if(!p) return;
      const name = p.name || "Alguien";
      const title = p.songTitle || "una canción";
      const artist = p.songArtist ? ` — ${p.songArtist}` : "";
      showVoteToast(`🎉 ${name} votó por ${title}${artist}`);
    });

    // ===== State =====
    const API_BASE = `/api/r/${room}`;
    let state = null;

    async function loadState(){
      const r = await fetch(`${API_BASE}/state`, { cache:"no-store" });
      const data = await r.json().catch(()=>({}));
      if(!r.ok || !data.ok) throw new Error(data.error || "Restaurante no existe");
      state = data;

      $("roomName").textContent = (data.name || "VOTIFY").toUpperCase();

      // QR
      const qrUrl = data.qrUrl || "";
      $("qrImg").src = qrUrl ? `${qrUrl}?t=${Date.now()}` : "";
      $("qrUrlText").textContent = `${location.origin}/r/${data.id}`;

      // lista
      renderList(data.songs || []);
      return data;
    }

    function renderList(songs){
      const list = $("list");
      list.innerHTML = "";
      const top = [...songs].slice(0, 25);

      top.forEach((s, idx) => {
        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <div class="rank">${idx+1}</div>
          <div class="info">
            <div class="songTitle">${esc(s.title || "Sin título")}</div>
            <div class="songArtist">${esc(s.artist || "")}</div>
          </div>
          <div class="votes">${Number(s.votes||0)} votos</div>
        `;
        list.appendChild(row);
      });
    }

    socket.on("votes:update", ({ songs }) => {
      if(Array.isArray(songs)) renderList(songs);
    });

    // ===== YouTube Player =====
    let player = null;
    let currentIndex = 0;
    let __resetOnNext = false;

    const startBtn = $("startBtn");
    const soundBtn = $("soundBtn");

    // progreso
    const progressBar = $("progressBar");
    let currentStartAt = 0;
    let currentDurSec = 0;
    function tickProgress(){
      if(!currentStartAt || !currentDurSec) {
        progressBar.style.width = "0%";
        requestAnimationFrame(tickProgress);
        return;
      }
      const t = (Date.now() - currentStartAt) / 1000;
      const pct = clamp((t / currentDurSec) * 100, 0, 100);
      progressBar.style.width = pct.toFixed(2) + "%";
      requestAnimationFrame(tickProgress);
    }
    requestAnimationFrame(tickProgress);

    function getPlayableSongs(){
      const songs = state?.songs || [];
      // evitamos bloqueadas si las manejas
      return songs.filter(s => !s.blocked && s.youtubeId);
    }

    function setNowSong(song){
      $("nowTitle").textContent = song?.title || "Votify — TV";
      $("nowArtist").textContent = song?.artist || "—";
    }

    function emitSongStart(song, durationSec){
      const startedAt = Date.now();
      currentStartAt = startedAt;
      currentDurSec = Number(durationSec || 0);

      socket.emit("song:start", {
        room,
        songId: song.id,
        startedAt,
        durationSec: currentDurSec
      });
    }

    function emitSongEnded(song){
      socket.emit("song:ended", { room, songId: song.id });
    }

    function blockSong(song, reason){
      socket.emit("song:block", { room, songId: song.id, reason: reason || "PENDIENTE DE LINK CORRECTO" });
    }

    function playIndex(idx){
      const songs = getPlayableSongs();
      if(!songs.length) return;

      currentIndex = (idx + songs.length) % songs.length;
      const song = songs[currentIndex];
      setNowSong(song);

      if(!player) return;

      __resetOnNext = false;
      try{
        player.loadVideoById(song.youtubeId);
      }catch(e){
        __resetOnNext = true;
        skipToNext("Error cargando video");
      }
    }

    function skipToNext(why){
      const songs = getPlayableSongs();
      if(!songs.length) return;
      currentIndex = (currentIndex + 1) % songs.length;
      playIndex(currentIndex);
    }

    // autoplay helpers
    startBtn.onclick = () => {
      try{
        player.playVideo();
        startBtn.style.display = "none";
      }catch(_){}
    };
    soundBtn.onclick = () => {
      try{
        player.unMute();
        player.setVolume(80);
        soundBtn.style.display = "none";
      }catch(_){}
    };

    window.onYouTubeIframeAPIReady = async function(){
      try{
        await loadState();
      }catch(e){
        // si la sala no existe, mostramos mensaje arriba
        $("nowTitle").textContent = "Restaurante no existe";
        $("nowArtist").textContent = "Crea una sala nueva en /admin";
        return;
      }

      player = new YT.Player("player", {
        height: "100%",
        width: "100%",
        host: "https://www.youtube-nocookie.com",
        playerVars: {
          autoplay: 1,
          controls: 0,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          origin: window.location.origin,
          enablejsapi: 1
        },
        events: {
          onReady: () => {
            // autoplay más confiable si inicia mute
            try{
              player.mute();
              player.playVideo();
            }catch(_){}

            // mostramos botones por si autoplay/sound requieren gesto
            startBtn.style.display = "block";
            soundBtn.style.display = "block";

            // arrancar con primera canción
            playIndex(0);
          },
          onStateChange: (ev) => {
            if(!state) return;
            const songs = getPlayableSongs();
            const song = songs[currentIndex];

            // CUANDO EMPIEZA A REPRODUCIR
            if(ev.data === YT.PlayerState.PLAYING){
              try{
                const dur = player.getDuration();
                emitSongStart(song, dur || 0);
              }catch(_){}
              // si ya empezó, escondemos botón start
              startBtn.style.display = "none";
            }

            // CUANDO TERMINA
            if(ev.data === YT.PlayerState.ENDED){
              try{ emitSongEnded(song); }catch(_){}
              skipToNext("Ended");
            }
          },
          onError: (ev) => {
            // error real -> bloquear y saltar
            const code = ev?.data;
            const songs = getPlayableSongs();
            const song = songs[currentIndex];
            __resetOnNext = true;

            // marcamos la canción como mala para que baje y no moleste
            try{
              blockSong(song, `Error YouTube (${code})`);
            }catch(_){}

            skipToNext(`YT error ${code}`);
          }
        }
      });
    };

    // refresco del estado por si cambia ranking/canciones
    async function poll(){
      try{
        const data = await loadState();
        // Si cambió lista, intenta mantener el índice dentro del rango
        const playable = getPlayableSongs();
        if(player && playable.length && currentIndex >= playable.length){
          currentIndex = 0;
        }
      }catch(_){}
      setTimeout(poll, 3000);
    }
    poll();
  </script>
</body>
</html>
