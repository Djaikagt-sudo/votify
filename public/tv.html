<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Votify — TV</title>

  <link rel="icon" type="image/png" href="/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#9E1AAD;
      --dark:#1B0426;
      --accent:#FF14E4;

      --bg: var(--dark);
      --txt:#fff;

      --good:#2ee59d;
      --bad:#ff3b3b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(158,26,173,.18) 0%, transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(255,20,228,.10) 0%, transparent 55%),
        linear-gradient(180deg, #120018, var(--bg));
      color:var(--txt);
    }

    .topbar{
      padding:18px 22px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }
    .leftTop{display:flex;flex-direction:column;gap:8px}
    .title{font-size:22px;font-weight:800;letter-spacing:.2px}
    .pills{display:flex;gap:10px;flex-wrap:wrap}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.88);
      font-size:12px;
      white-space:nowrap;
    }
    .dot{width:8px;height:8px;border-radius:50%;background:var(--bad);box-shadow:0 0 0 4px rgba(255,59,59,.12)}
    .dot.ok{background:var(--good);box-shadow:0 0 0 4px rgba(46,229,157,.12)}

    .progWrap{
      margin-top:10px;
      width: 520px;
      max-width: 100%;
    }
    .progBar{
      height:12px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:999px;
      overflow:hidden;
    }
    .progFill{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width .25s linear;
    }
    .progTime{
      margin-top:6px;
      font-size:12px;
      color: rgba(255,255,255,.78);
    }

    .rightTop{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
      min-width:240px;
    }
    #restaurantName{
      font-weight:900;
      letter-spacing:.6px;
      font-size:22px;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 12px 40px rgba(158,26,173,.20);
    }

    .layout{
      display:flex;
      gap:18px;
      padding:0 18px 18px 18px;
      height: calc(100vh - 92px);
      align-items: stretch;
    }
    .layout > .card:first-child{ flex: 2; min-width: 0; }
    .layout > .card:last-child{ flex: 1; min-width: 360px; }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.18));
      border:1px solid rgba(255,255,255,.10);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      position:relative;
      min-height:0;
    }

    .playerWrap{position:relative; width:100%; height:100%;}
    #player{position:absolute; inset:0;}

    .btn{
      position:absolute;
      right:12px;
      bottom:12px;
      z-index:50;
      height:40px;
      padding:0 14px;
      border-radius:14px;
      border:1px solid rgba(255,20,228,.28);
      background:rgba(158,26,173,.22);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      box-shadow:0 14px 40px rgba(158,26,173,.22);
    }
    .btn:active{transform:translateY(1px)}
    .btnSound{
      bottom:58px;
      background:rgba(255,20,228,.14);
    }
    .btnStart{
      left:12px;
      right:auto;
    }

    .logoCorner{
      position:absolute;
      left:12px;
      bottom:12px;
      z-index:60;
      width:70px;height:70px;
      border-radius:16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      overflow:hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(158,26,173,.18);
    }
    .logoCorner img{width:100%;height:100%;object-fit:contain;padding:10px}

    /* ===== TOP CARD: QR arriba del ranking ===== */
    .rankTop{
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:space-between;
    }
    .rankLeft{
      display:flex;
      gap:14px;
      align-items:center;
      min-width:0;
    }
    .qrBlock{
      display:flex;
      align-items:center;
      gap:14px;
      padding:12px;
      border-radius:18px;
      background:rgba(0,0,0,.26);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      box-shadow:0 16px 46px rgba(0,0,0,.25);
      width:100%;
    }
    .qrBlock img{
      width:160px;
      height:160px;
      border-radius:18px;
      background:#fff;
      padding:10px;
      object-fit:contain;
      flex:0 0 auto;
    }
    .qrInfo{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }
    .qrTitle{
      font-size:14px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
    }
    .qrTag{
      display:inline-flex;
      width:max-content;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,20,228,.24);
      background:rgba(158,26,173,.16);
      font-size:12px;
      font-weight:900;
      letter-spacing:.8px;
      text-transform:uppercase;
      color:#fff;
      box-shadow:0 10px 30px rgba(158,26,173,.16);
    }
    .qrLink{
      font-size:12px;
      color:rgba(255,255,255,.80);
      word-break:break-all;
      line-height:1.25;
      max-width: 100%;
    }
    #qrHint{
      display:none;
      font-size:12px;
      color:rgba(255,255,255,.70);
    }

    .rankHead{
      padding:12px 14px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .rankHead b{font-size:14px}
    .ranking{
      padding:10px 10px 12px;
      overflow:auto;
      height: calc(100% - 14px - 200px - 54px); /* aproximado */
      min-height: 0;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(0,0,0,.18);
      margin-bottom:10px;
    }
    .leftRow{display:flex;align-items:center;gap:10px;min-width:0}
    .pos{
      width:28px;height:28px;border-radius:12px;
      display:grid;place-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.88);
      font-size:12px;
      flex:0 0 auto;
    }
    .song{display:flex;flex-direction:column;gap:3px;min-width:0}
    .song b{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song span{font-size:12px;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .votes{
      font-size:12px;
      padding:6px 10px;border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.88);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .toast{
      position:fixed;
      left:50%;
      transform:translateX(-50%);
      bottom:16px;
      background: rgba(0,0,0,.75);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      display:none;
      z-index:9999;
      max-width:min(680px, calc(100vw - 24px));
      font-size:13px;
    }

    @media (max-width: 980px){
      .layout{flex-direction:column;height:auto}
      .layout > .card:last-child{min-width:0}
      #restaurantName{font-size:18px}
      .qrBlock img{width:140px;height:140px}
      .ranking{height:auto}
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="leftTop">
      <div class="title" id="nowTitle">Votify — TV</div>
      <div class="progWrap">
        <div class="progBar"><div class="progFill" id="tvFill"></div></div>
        <div class="progTime" id="tvTime">⏳ 0:00 / 0:00</div>
      </div>
      <div class="pills">
        <div class="pill" id="roomPill">Sala: —</div>
        <div class="pill"><span>Modo: no repetir</span></div>
        <div class="pill"><span class="dot" id="dot"></span><span id="statusText">Conectando…</span></div>
      </div>
    </div>

    <div class="rightTop">
      <div id="restaurantName">—</div>
      <div class="pill">Link voto: <span id="qrLinkText">—</span></div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="playerWrap">
        <div id="player"></div>

        <button class="btn btnStart" id="startBtn" style="display:none">Iniciar ▶</button>
        <button class="btn btnSound" id="soundBtn" style="display:none">Activar sonido 🔊</button>

        <div class="logoCorner"><img src="/icon.png" alt="Votify"></div>
      </div>
    </div>

    <div class="card">
      <!-- ✅ QR ARRIBA DEL TOP -->
      <div class="rankTop">
        <div class="qrBlock">
          <img id="qrImg" alt="QR">
          <div class="qrInfo">
            <div class="qrTitle">ESCANEA Y VOTA</div>
            <div class="qrTag">YOU ARE THE DJ</div>
            <div id="qrHint">QR no encontrado</div>
            <div class="qrLink" id="qrLinkText2">—</div>
          </div>
        </div>
      </div>

      <div class="rankHead">
        <b>Top votadas</b>
        <div class="pill">Actualiza en vivo</div>
      </div>
      <div class="ranking" id="ranking"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/vendor/socket.io.min.js"></script>
  <script>
    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(showToast._tm);
      showToast._tm = setTimeout(()=> t.style.display = "none", 2800);
    }

    // ✅ ID o URL → ID
    function normalizeYouTubeId(input){
      if(input == null) return null;
      const s = String(input).trim();
      if(/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;

      try{
        const u = new URL(s);
        if(u.hostname.includes("youtu.be")){
          const id = u.pathname.replace("/", "");
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
        }
        const v = u.searchParams.get("v");
        return /^[a-zA-Z0-9_-]{11}$/.test(v || "") ? v : null;
      }catch(_){
        return null;
      }
    }

    const room = (location.pathname.split("/tv/")[1] || "").split("/")[0];
    const origin = location.origin;
    const voteUrl = `${origin}/r/${room}`;

    document.getElementById("roomPill").textContent = `Sala: ${room || "—"}`;
    document.getElementById("qrLinkText").textContent = voteUrl;
    const qrLink2 = document.getElementById("qrLinkText2");
    if(qrLink2) qrLink2.textContent = voteUrl;

    let currentSongs = [];
    let playedSet = new Set();

    let player = null;
    let __skipLock = false;
    let __resetOnNext = false;

    let __consecutiveFails = 0;
    const MAX_CONSECUTIVE_FAILS = 6;

    let lastPlayedId = null;

    // ===== Progress UI =====
    let _progTimer = null;
    function fmtTime(sec){
      sec = Math.max(0, Math.floor(sec||0));
      const m = Math.floor(sec/60);
      const s = sec%60;
      return `${m}:${String(s).padStart(2,"0")}`;
    }
    function startProgressTicker(){
      stopProgressTicker();
      _progTimer = setInterval(() => {
        if(!player) return;
        try{
          const dur = Number(player.getDuration?.() || 0);
          const cur = Number(player.getCurrentTime?.() || 0);
          if(!dur) return;
          const pct = Math.max(0, Math.min(100, (cur/dur)*100));
          const fill = document.getElementById("tvFill");
          if(fill) fill.style.width = pct + "%";
          const t = document.getElementById("tvTime");
          if(t) t.textContent = `⏳ ${fmtTime(cur)} / ${fmtTime(dur)}`;
        }catch(_){}
      }, 250);
    }
    function stopProgressTicker(){
      if(_progTimer){ clearInterval(_progTimer); _progTimer = null; }
    }

    const startBtn = document.getElementById("startBtn");
    const soundBtn = document.getElementById("soundBtn");

    function pickNextSong(){
      if(!currentSongs.length) return null;
      const sorted = [...currentSongs].sort((a,b)=> (b.votes||0)-(a.votes||0));
      for(const s of sorted){
        if(!playedSet.has(s.id)) return s;
      }
      playedSet.clear();
      return sorted[0];
    }

    function renderRanking(songs){
      const container = document.getElementById("ranking");
      if(!songs.length){
        container.innerHTML = `<div style="padding:12px;color:rgba(255,255,255,.7)">Sin canciones.</div>`;
        return;
      }
      const sorted = [...songs].sort((a,b)=> (b.votes||0)-(a.votes||0));
      container.innerHTML = sorted.slice(0, 10).map((s, idx)=>`
        <div class="row">
          <div class="leftRow">
            <div class="pos">${idx+1}</div>
            <div class="song">
              <b>${escapeHtml(s.title || "—")}</b>
              <span>${escapeHtml(s.artist || "")}</span>
            </div>
          </div>
          <div class="votes">${(s.votes||0)} votos</div>
        </div>
      `).join("");
    }

    function setQrFromState(data){
      const img = document.getElementById("qrImg");
      const hint = document.getElementById("qrHint");
      hint.style.display = "none";
      img.style.opacity = "1";

      const qrDataUrl = data?.qrDataUrl || data?.qr || data?.qr_url || "";
      if(typeof qrDataUrl === "string" && qrDataUrl.startsWith("data:image")){
        img.src = qrDataUrl;
        return;
      }

      const qrUrl = data?.qrUrl || data?.qr_url || "";
      if(typeof qrUrl === "string" && qrUrl.length > 0){
        img.src = qrUrl;
        img.onerror = () => {
          img.style.opacity = "0.35";
          hint.style.display = "block";
        };
        return;
      }

      img.src = `${origin}/qrcodes/${room}.png`;
      img.onerror = () => {
        img.style.opacity = "0.35";
        hint.style.display = "block";
      };
    }

    async function loadState(){
      const res = await fetch(`/api/r/${room}/state`);
      const data = await res.json().catch(()=> ({}));

      if(!res.ok || data.ok === false){
        document.getElementById("ranking").innerHTML = `
          <div style="padding:12px;color:#fff">
            ❌ ${escapeHtml(data?.error || "Restaurante no existe")}
            <div style="color:rgba(255,255,255,.65);margin-top:8px">Crea una sala nueva en /admin.</div>
          </div>
        `;
        return false;
      }

      document.getElementById("restaurantName").textContent = (data.name || "").trim() || "—";
      setQrFromState(data);

      currentSongs = Array.isArray(data.songs) ? data.songs : [];
      renderRanking(currentSongs);
      return true;
    }

    function skipToNext(reason){
      if(__skipLock) return;
      __skipLock = true;
      console.log("⏭️ skip:", reason);

      if(String(reason||"").startsWith("yt-error")){
        showToast(`⚠️ YouTube error ${reason}. Saltando…`);
      }
      if(reason === "invalid-id"){
        showToast("⚠️ youtubeId inválido. Saltando…");
      }

      setTimeout(async () => {
        __skipLock = false;
        __consecutiveFails++;

        if(__consecutiveFails >= MAX_CONSECUTIVE_FAILS){
          __consecutiveFails = 0;
          showToast("⚠️ Muchos videos fallando (posible bloqueo embed).");
        }

        const next = pickNextSong();
        if(!next) return;

        if(__resetOnNext){
          __resetOnNext = false;
          try{ player?.destroy?.(); }catch(_){}
          player = null;
          await createPlayer();
        }

        playSong(next);
      }, 650);
    }

    function playSong(song){
      const ytId = normalizeYouTubeId(song?.youtubeId);
      if(!song || !ytId) return skipToNext("invalid-id");

      lastPlayedId = song.id;
      playedSet.add(song.id);

      document.getElementById("nowTitle").textContent =
        `${song.title}${song.artist ? " — " + song.artist : ""}`;

      try{
        player.loadVideoById({
          videoId: ytId,
          startSeconds: 0
        });
      }catch(_){
        skipToNext("load-failed");
      }
    }

    function onPlayerStateChange(e){
      if(e.data === YT.PlayerState.PLAYING){
        __consecutiveFails = 0;
        startProgressTicker();

        try{
          const startedAt = Date.now();
          const durationSec = Number(player?.getDuration?.() || 0);
          if(socket && room && lastPlayedId != null){
            socket.emit("song:start", { room, songId: lastPlayedId, startedAt, durationSec });
          }
        }catch(_){}

        return;
      }

      if(e.data === YT.PlayerState.ENDED){
        stopProgressTicker();

        try{
          if(socket && room && lastPlayedId != null){
            socket.emit("song:ended", { room, songId: lastPlayedId });
          }
        }catch(_){}

        const next = pickNextSong();
        if(next) playSong(next);
        return;
      }
    }

    startBtn.addEventListener("click", () => {
      startBtn.style.display = "none";
      try{ player?.playVideo?.(); }catch(_){}
    });

    soundBtn.addEventListener("click", () => {
      soundBtn.style.display = "none";
      try{
        player?.unMute?.();
        player?.setVolume?.(100);
        player?.playVideo?.();
      }catch(_){}
    });

    function loadYouTubeApi(){
      return new Promise((resolve) => {
        if(window.YT && window.YT.Player) return resolve();
        const tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        document.body.appendChild(tag);
        window.onYouTubeIframeAPIReady = () => resolve();
      });
    }

    function createPlayer(){
      return new Promise((resolve) => {
        player = new YT.Player("player", {
          height: "100%",
          width: "100%",
          host: "https://www.youtube-nocookie.com",
          playerVars: {
            autoplay: 1,
            controls: 0,
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
            origin: window.location.origin,
            enablejsapi: 1
          },
          events: {
            onReady: () => {
              try { player.mute(); } catch(_) {}

              if (startBtn) startBtn.style.display = "block";
              if (soundBtn) soundBtn.style.display = "block";

              resolve();
            },
            onStateChange: onPlayerStateChange,
            onError: (ev) => {
              const code = ev?.data;
              __resetOnNext = true;
              skipToNext(`yt-error:${code}`);
            }
          }
        });
      });
    }

    // ===== Socket + fallback =====
    let socket = null;
    let fallbackTimer = null;

    function setConnectedUI(ok){
      const dot = document.getElementById("dot");
      const txt = document.getElementById("statusText");
      if(ok){
        dot.classList.add("ok");
        txt.textContent = "Conectado ✅";
      }else{
        dot.classList.remove("ok");
        txt.textContent = "Conectando…";
      }
    }

    function startFallbackPolling(){
      if(fallbackTimer) return;
      fallbackTimer = setInterval(async () => {
        await loadState();
      }, 2500);
    }

    function stopFallbackPolling(){
      if(!fallbackTimer) return;
      clearInterval(fallbackTimer);
      fallbackTimer = null;
    }

    function initSocket(){
      if(typeof window.io !== "function"){
        setConnectedUI(false);
        showToast("⚠️ socket.io no cargó. Fallback activo.");
        startFallbackPolling();
        return;
      }

      socket = window.io({ transports:["websocket","polling"] });

      socket.on("connect", () => {
        setConnectedUI(true);
        stopFallbackPolling();
        socket.emit("room:join", { room });
      });

      socket.on("disconnect", () => {
        setConnectedUI(false);
        startFallbackPolling();
      });

      socket.on("votes:update", ({ room: r, songs }) => {
        if(r !== room) return;
        if(Array.isArray(songs)){
          currentSongs = songs;
          renderRanking(currentSongs);
        }
      });
    }

    (async function init(){
      if(!room){
        document.getElementById("ranking").innerHTML = `<div style="padding:12px;color:#fff">Sala inválida</div>`;
        return;
      }

      setConnectedUI(false);
      initSocket();

      const ok = await loadState();
      if(!ok) return;

      await loadYouTubeApi();
      await createPlayer();

      const first = pickNextSong();
      if(first) playSong(first);
      else showToast("⚠️ No hay canciones en la sala.");
    })();
  </script>
</body>
</html>
