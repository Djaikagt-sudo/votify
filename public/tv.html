<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Votify — TV</title>

  <link rel="icon" type="image/png" href="/icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#9E1AAD;
      --dark:#1B0426;
      --accent:#FF14E4;

      --bg: var(--dark);
      --txt:#fff;

      --good:#2ee59d;
      --bad:#ff3b3b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(158,26,173,.18) 0%, transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(255,20,228,.10) 0%, transparent 55%),
        linear-gradient(180deg, #120018, var(--bg));
      color:var(--txt);
    }

    .topbar{
      padding:18px 22px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }
    .leftTop{display:flex;flex-direction:column;gap:8px}
    .title{font-size:22px;font-weight:800;letter-spacing:.2px}
    .pills{display:flex;gap:10px;flex-wrap:wrap}
    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:rgba(255,255,255,.88);
      font-size:12px;
      white-space:nowrap;
    }
    .dot{width:8px;height:8px;border-radius:50%;background:var(--bad);box-shadow:0 0 0 4px rgba(255,59,59,.12)}
    .dot.ok{background:var(--good);box-shadow:0 0 0 4px rgba(46,229,157,.12)}

    .rightTop{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:10px;
      min-width:240px;
    }
    #restaurantName{
      font-weight:900;
      letter-spacing:.6px;
      font-size:22px;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 12px 40px rgba(158,26,173,.20);
    }

    .layout{
      display:flex;
      gap:18px;
      padding:0 18px 18px 18px;
      height: calc(100vh - 92px);
      align-items: stretch;
    }
    .layout > .card:first-child{ flex: 2; min-width: 0; }
    .layout > .card:last-child{ flex: 1; min-width: 340px; }

    .card{
      background:linear-gradient(180deg, rgba(27,4,38,.88), rgba(12,13,25,.65));
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .cardHead{
      padding:14px 14px 12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .cardHead h2{
      margin:0;
      font-size:14px;
      font-weight:800;
      letter-spacing:.2px;
      color:rgba(255,255,255,.92);
    }
    .sub{font-size:12px;color:rgba(255,255,255,.65);}

    .playerWrap{
      position:relative;
      flex:1;
      min-height:0;
      background:#000;
    }
    #player{ position:absolute; inset:0; }

    .btnCorner{
      position:absolute;
      top:12px;
      right:12px;
      z-index:60;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border:1px solid rgba(255,255,255,.14);
      backdrop-filter: blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    .btnCorner:hover{ filter: brightness(1.05); }
    .btnStart{ left:12px; right:auto; }

    /* ✅ LOGO MÁS GRANDE */
    .logoCorner{
      position:absolute;
      left:12px;
      bottom:12px;
      z-index:60;
      width:62px;height:62px;
      border-radius:18px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      display:grid;
      place-items:center;
      overflow:hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(158,26,173,.18);
    }
    .logoCorner img{width:100%;height:100%;object-fit:contain;padding:10px}

    /* ✅ QR MÁS VISIBLE */
    .qrTop{
      display:flex;
      gap:14px;
      padding:14px;
      border-bottom:1px solid rgba(255,255,255,.10);
      align-items:center;
    }
    #qrImg{
      width:150px;height:150px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:#000;
      object-fit:cover;
    }
    .qrText{min-width:0}
    .qrTitle{
      font-weight:900;
      letter-spacing:.6px;
      text-transform:uppercase;
    }
    .djPill{
      display:inline-flex;
      margin-top:8px;
      padding:7px 12px;
      border-radius:999px;
      font-weight:900;
      font-size:12px;
      color:#fff;
      background: rgba(158,26,173,.22);
      border:1px solid rgba(255,20,228,.30);
    }
    .qrLink{
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.70);
      word-break:break-all;
    }
    .qrHint{
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.62);
      display:none;
    }

    .rankBody{
      padding:12px 12px 14px;
      overflow:auto;
      flex:1;
    }
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(10,11,18,.35);
      margin-bottom:10px;
    }
    .leftRow{display:flex;gap:10px;align-items:center;min-width:0}
    .pos{
      width:28px;height:28px;border-radius:10px;
      display:grid;place-items:center;
      font-weight:800;font-size:12px;
      background:rgba(158,26,173,.18);
      border:1px solid rgba(255,20,228,.20);
      color:#fff;
      flex:0 0 auto;
    }
    .song{min-width:0;display:flex;flex-direction:column;gap:2px}
    .song b{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .song span{font-size:12px;color:rgba(255,255,255,.65);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .votes{
      font-weight:800;
      font-size:12px;
      color:#fff;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      padding:7px 10px;
      border-radius:999px;
      flex:0 0 auto;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(27,4,38,.92);
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      padding:12px 14px;
      color:#fff;
      font-weight:700;
      display:none;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      z-index:9999;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="leftTop">
      <div class="title" id="nowTitle">Votify — TV</div>
      <div class="pills">
        <div class="pill" id="roomPill">Sala: —</div>
        <div class="pill"><span>Modo: no repetir</span></div>
        <div class="pill"><span class="dot" id="dot"></span><span id="statusText">Conectando…</span></div>
      </div>
    </div>

    <div class="rightTop">
      <div id="restaurantName">—</div>
      <div class="pill">Siempre suena</div>
    </div>
  </div>

  <div class="layout">
    <div class="card">
      <div class="cardHead">
        <h2>Reproducción</h2>
        <div class="sub">Auto-skip solo por error real • Start si autoplay bloqueado</div>
      </div>

      <div class="playerWrap">
        <div id="player"></div>

        <button class="btnCorner btnStart" id="startBtn" style="display:none">▶ Iniciar reproducción</button>
        <button class="btnCorner" id="soundBtn" style="display:none">🔊 Activar sonido</button>

        <div class="logoCorner" title="Votify">
          <img src="/icon.png" alt="Votify" onerror="this.parentElement.style.display='none'">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="cardHead">
        <h2>Top de votos</h2>
        <div class="sub">En vivo</div>
      </div>

      <!-- ✅ QR ARRIBA DEL TOP -->
      <div class="qrTop">
        <img id="qrImg" alt="QR Votify">
        <div class="qrText">
          <div class="qrTitle">ESCANEA Y VOTA</div>
          <div class="djPill">YOU ARE THE DJ</div>
          <div class="qrLink" id="qrLinkText"></div>
          <div class="qrHint" id="qrHint">QR no encontrado. Igual podés votar con el link.</div>
        </div>
      </div>

      <div class="rankBody" id="ranking"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function showToast(msg){
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.style.display = "block";
      clearTimeout(showToast._tm);
      showToast._tm = setTimeout(()=> t.style.display = "none", 2800);
    }

    function normalizeYouTubeId(input){
      if(input == null) return null;
      const s = String(input).trim();
      if(/^[a-zA-Z0-9_-]{11}$/.test(s)) return s;

      try{
        const u = new URL(s);
        if(u.hostname.includes("youtu.be")){
          const id = u.pathname.replace("/", "");
          return /^[a-zA-Z0-9_-]{11}$/.test(id) ? id : null;
        }
        const v = u.searchParams.get("v");
        return /^[a-zA-Z0-9_-]{11}$/.test(v || "") ? v : null;
      }catch(_){
        return null;
      }
    }

    const room = (location.pathname.split("/tv/")[1] || "").split("/")[0];
    const origin = location.origin;
    const voteUrl = `${origin}/r/${room}`;

    document.getElementById("roomPill").textContent = `Sala: ${room || "—"}`;
    document.getElementById("qrLinkText").textContent = voteUrl;

    let currentSongs = [];
    function renderRanking(songs){
      const el = document.getElementById("ranking");
      if(!songs || !songs.length){
        el.innerHTML = `<div style="padding:12px;color:rgba(255,255,255,.75)">Sin canciones.</div>`;
        return;
      }
      const sorted = [...songs].sort((a,b)=> (b.votes||0) - (a.votes||0));
      el.innerHTML = sorted.slice(0, 12).map((s, i) => `
        <div class="row">
          <div class="leftRow">
            <div class="pos">${i+1}</div>
            <div class="song">
              <b>${escapeHtml(s.title || "—")}</b>
              <span>${escapeHtml(s.artist || "")}</span>
            </div>
          </div>
          <div class="votes">${(s.votes||0)} votos</div>
        </div>
      `).join("");
    }

    function setQrFromState(data){
      const img = document.getElementById("qrImg");
      const hint = document.getElementById("qrHint");
      hint.style.display = "none";
      img.style.opacity = "1";

      const qrUrl = data?.qrUrl || "";
      if(typeof qrUrl === "string" && qrUrl.length > 0){
        img.src = qrUrl;
      } else {
        img.src = `${origin}/qrcodes/${room}.png`;
      }

      img.onerror = () => {
        img.style.opacity = "0.25";
        hint.style.display = "block";
      };
    }

    async function loadState(){
      const res = await fetch(`/api/r/${room}/state`);
      const data = await res.json().catch(()=> ({}));

      if(!res.ok || data.ok === false){
        document.getElementById("ranking").innerHTML = `
          <div style="padding:12px;color:#fff">
            ❌ ${escapeHtml(data?.error || "Restaurante no existe")}
            <div style="color:rgba(255,255,255,.65);margin-top:8px">Crea una sala nueva en /admin.</div>
          </div>
        `;
        return false;
      }

      document.getElementById("restaurantName").textContent = (data.name || "").trim() || "—";
      setQrFromState(data);

      currentSongs = Array.isArray(data.songs) ? data.songs : [];
      renderRanking(currentSongs);
      return true;
    }

    const socket = io({ transports:["websocket","polling"] });

    socket.on("connect", () => {
      document.getElementById("dot").classList.add("ok");
      document.getElementById("statusText").textContent = "Conectado";
      socket.emit("room:join", { room });
    });

    socket.on("disconnect", () => {
      document.getElementById("dot").classList.remove("ok");
      document.getElementById("statusText").textContent = "Conectando…";
    });

    socket.on("votes:update", ({ room: r, songs }) => {
      if(r !== room) return;
      currentSongs = Array.isArray(songs) ? songs : [];
      renderRanking(currentSongs);
    });

    loadState().catch(()=>{});

    // (resto del player YouTube igual que tu base; no lo toco aquí para no romperlo)
  </script>
</body>
</html>
