<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Votify — Admin</title>

  <link rel="icon" type="image/png" href="/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --primary:#9E1AAD;
      --dark:#1B0426;
      --accent:#FF14E4;
      --txt:#fff;
      --muted: rgba(255,255,255,.78);
      --line: rgba(255,255,255,.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(158,26,173,.18) 0%, transparent 60%),
        radial-gradient(900px 500px at 80% 20%, rgba(255,20,228,.10) 0%, transparent 55%),
        linear-gradient(180deg, #120018, var(--dark));
      color:var(--txt);
    }
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .card{
      border:1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius:18px;
      overflow:hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,.30);
    }
    .head{
      padding:14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      border-bottom:1px solid var(--line);
    }
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .logo{
      width:54px;height:54px;border-radius:14px;
      border:1px solid rgba(255,20,228,.20);
      background: rgba(158,26,173,.12);
      display:grid;place-items:center;overflow:hidden;flex:0 0 auto;
      box-shadow: 0 10px 30px rgba(158,26,173,.14);
    }
    .logo img{width:100%;height:100%;object-fit:contain;padding:9px}
    h1{margin:0;font-size:18px;font-weight:900}
    .sub{margin-top:4px;color:var(--muted);font-size:12px}

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      padding:14px;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
    }

    .panel{
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.20);
      border-radius:16px;
      padding:14px;
    }
    .panel h2{
      margin:0 0 10px;
      font-size:14px;
      letter-spacing:.2px;
    }
    label{
      display:block;
      font-size:12px;
      color:rgba(255,255,255,.85);
      margin:10px 0 6px;
    }
    input, select{
      width:100%;
      height:38px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
      color:#fff;
      padding:0 12px;
      outline:none;
    }
    input::placeholder{ color: rgba(255,255,255,.55); }

    .row{display:flex;gap:10px}
    .row > *{flex:1}
    .btn{
      height:38px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid rgba(255,20,228,.30);
      background: rgba(158,26,173,.22);
      color:#fff;
      font-weight:900;
      cursor:pointer;
    }
    .btn.secondary{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-weight:800;
    }

    .result{
      margin-top:12px;
      border-radius:16px;
      padding:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      color:rgba(255,255,255,.9);
      font-size:12px;
      word-break:break-all;
    }
    .pill{
      display:inline-flex;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color:rgba(255,255,255,.85);
      font-size:12px;
      gap:8px;
      align-items:center;
    }
    .genres{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }
    .check{
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      font-size:12px;
      color:rgba(255,255,255,.9);
    }
    .check input{width:auto;height:auto}
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div class="brand">
          <div class="logo"><img src="/icon.png" alt="Votify"></div>
          <div>
            <h1>Admin</h1>
            <div class="sub">Crear sala y administrar playlists</div>
          </div>
        </div>
        <div class="pill">Votify</div>
      </div>

      <div class="grid">
        <div class="panel">
          <h2>Crear sala</h2>

          <label for="restaurantName">Nombre del restaurante</label>
          <!-- ✅ sin “Ej. Los Cuchos” -->
          <input id="restaurantName" placeholder="NOMBRE DEL RESTAURANTE O SALA" autocomplete="off" />

          <div class="row">
            <div>
              <label for="totalSongs">Cantidad de canciones</label>
              <!-- ✅ sin valor prellenado (no muestra 60) -->
              <input id="totalSongs" type="number" min="5" max="400" placeholder="Ej. 60" value="" />
            </div>
            <div style="display:flex;align-items:flex-end;gap:10px">
              <button class="btn" id="createBtn" style="width:100%">Crear</button>
            </div>
          </div>

          <label>Géneros</label>
          <div class="genres" id="genresBox"></div>

          <div class="result" id="resultBox" style="display:none"></div>
        </div>

        <div class="panel">
          <h2>Links</h2>
          <div class="result" id="linksBox">
            Crea una sala para ver los links.
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_GENRES = [
      "REGGAETON", "BANDA", "SALSA", "CUMBIA", "POP", "ROCK", "ELECTRONICA"
    ];

    const genresBox = document.getElementById("genresBox");
    const resultBox = document.getElementById("resultBox");
    const linksBox = document.getElementById("linksBox");

    function renderGenres(genres){
      genresBox.innerHTML = "";
      genres.forEach((g) => {
        const chip = document.createElement("label");
        chip.className = "check";
        chip.innerHTML = `<input type="checkbox" value="${g}" checked> <span>${g}</span>`;
        genresBox.appendChild(chip);
      });
    }
    renderGenres(DEFAULT_GENRES);

    function getSelectedGenres(){
      return [...genresBox.querySelectorAll("input[type=checkbox]")].filter(x=>x.checked).map(x=>x.value);
    }

    document.getElementById("createBtn").addEventListener("click", async () => {
      const name = (document.getElementById("restaurantName").value || "").trim();
      const totalSongsRaw = (document.getElementById("totalSongs").value || "").trim();
      const totalSongs = totalSongsRaw ? Number(totalSongsRaw) : undefined;
      const genres = getSelectedGenres();

      try{
        const res = await fetch("/api/admin/create", {
          method:"POST",
          headers:{ "Content-Type":"application/json" },
          body: JSON.stringify({ name, totalSongs, genres })
        });

        const data = await res.json().catch(()=> ({}));
        if(!res.ok || data.ok === false){
          resultBox.style.display = "block";
          resultBox.textContent = "❌ " + (data.error || "No se pudo crear la sala");
          return;
        }

        const id = data.id;
        const rUrl = `${location.origin}/r/${id}`;
        const tvUrl = `${location.origin}/tv/${id}`;

        resultBox.style.display = "block";
        resultBox.textContent = "✅ Sala creada: " + id;

        linksBox.innerHTML = `
          <div style="display:flex;flex-direction:column;gap:10px">
            <div><b>Cliente (votar):</b><div>${rUrl}</div></div>
            <div><b>TV:</b><div>${tvUrl}</div></div>
          </div>
        `;
      }catch(e){
        resultBox.style.display = "block";
        resultBox.textContent = "❌ Error de red";
      }
    });
  </script>
</body>
</html>
